# Amvera Cloud — деплой бэкенда из подпапки "ICS bot"
# Документация: https://docs.amvera.ru/applications/environments/python-pip.html
meta:
  environment: python
  toolchain:
    name: pip
    version: "3.12"

build:
  requirementsPath: ICS bot/requirements.txt
  useCache: true

run:
  scriptName: ICS bot/main.py
  containerPort: 5000
