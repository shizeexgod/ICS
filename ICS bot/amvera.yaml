# Этот файл оставлен для справки. Amvera читает amvera.yaml из КОРНЯ репозитория (../amvera.yaml).
# Не добавляйте сюда skip_build — для Python pip это недопустимое поле.
meta:
  environment: python
  toolchain:
    name: pip
    version: "3.12"

build:
  requirementsPath: requirements.txt
  useCache: true

run:
  command: uvicorn main:app --host 0.0.0.0 --port 5000
  containerPort: 5000
